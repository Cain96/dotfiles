name: Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.filter.outputs.workflows == 'true' || steps.filter.outputs.aqua == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check for relevant changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            workflows:
              - '.github/workflows/**'
            aqua:
              - '.aqua/**'

  check:
    name: Check
    needs: changes
    if: needs.changes.outputs.should_run == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install aqua
        uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        env:
          AQUA_CONFIG: ".aqua/aqua.yaml"
        with:
          aqua_version: "v2.60.1"

      - name: Run pinact
        run: pinact run --check

      - name: Run actionlint
        run: actionlint
